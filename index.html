<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Roma – Customer Service</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .chat-header {
      background-color: #8B0000;
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header .logo {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header .header-text h1 {
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .chat-header .header-text p {
      font-size: 0.8rem;
      opacity: 0.85;
      font-family: 'Arial', sans-serif;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* ── Chat window ── */
    .chat-window {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 420px;
      max-height: 520px;
      background: #faf8f6;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 82%;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #8B0000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background-color: #c0c0c0;
      color: #333;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      font-family: 'Arial', sans-serif;
    }

    .message.bot .bubble {
      background-color: #fff;
      color: #2c2c2c;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user .bubble {
      background-color: #8B0000;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .timestamp {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 4px;
      font-family: 'Arial', sans-serif;
      text-align: right;
    }

    .message.bot .timestamp {
      text-align: left;
    }

    .message-group {
      display: flex;
      flex-direction: column;
    }

    /* ── Input area ── */
    .chat-input-area {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #ece6df;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 11px 18px;
      font-size: 0.92rem;
      font-family: 'Arial', sans-serif;
      color: #333;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .chat-input-area textarea:focus {
      border-color: #8B0000;
    }

    .chat-input-area textarea::placeholder {
      color: #b0a8a0;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background-color: #8B0000;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s, transform 0.1s;
    }

    .send-btn:hover {
      background-color: #6b0000;
    }

    .send-btn:active {
      transform: scale(0.93);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* ── Quick replies ── */
    .quick-replies {
      padding: 0 20px 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: #fff;
    }

    .quick-reply-btn {
      background: #fff;
      color: #8B0000;
      border: 1.5px solid #8B0000;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .quick-reply-btn:hover {
      background-color: #8B0000;
      color: #fff;
    }

    /* ── Footer ── */
    .chat-footer {
      text-align: center;
      padding: 10px;
      font-size: 0.7rem;
      color: #b0a8a0;
      font-family: 'Arial', sans-serif;
      background: #fff;
      border-top: 1px solid #f0ebe5;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      align-items: flex-end;
      gap: 10px;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-dots {
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: #c0b0a8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Scrollbar ── */
    .chat-window::-webkit-scrollbar { width: 5px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="logo">🍷</div>
    <div class="header-text">
      <h1>Bella Roma</h1>
      <p><span class="status-dot"></span>Customer Service · London</p>
    </div>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">

    <div class="message bot">
      <div class="avatar">BR</div>
      <div class="message-group">
        <div class="bubble">
          Buongiorno! Welcome to Bella Roma 🍝<br>
          I'm here to help you with reservations, our menu, opening hours, or any other questions. How can I assist you today?
        </div>
        <div class="timestamp">Today, 12:00</div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="avatar">BR</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <textarea
      id="userInput"
      rows="1"
      placeholder="Type your message…"
      aria-label="Message input"
    ></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply-btn" data-text="Book a table">📅 Book a table</button>
    <button class="quick-reply-btn" data-text="View our menu">🍝 View our menu</button>
    <button class="quick-reply-btn" data-text="Opening hours">🕐 Opening hours</button>
  </div>

  <!-- Footer -->
  <div class="chat-footer">
    Bella Roma · 14 Soho Square, London W1D 3QG · +44 20 7946 0321
  </div>

</div>

<script>
  const chatWindow  = document.getElementById('chatWindow');
  const userInput   = document.getElementById('userInput');
  const sendBtn     = document.getElementById('sendBtn');
  const typingEl    = document.getElementById('typingIndicator');

  // Simple rule-based responses
  const responses = [
    {
      keywords: ['hour', 'open', 'close', 'time', 'when'],
      reply: "We're open Tuesday to Sunday:\n• Lunch: 12:00 – 15:00\n• Dinner: 18:00 – 22:30\nWe're closed on Mondays."
    },
    {
      keywords: ['book', 'reserv', 'table', 'seat'],
      reply: "We'd love to have you! You can book a table by calling us on +44 20 7946 0321, or simply let me know your preferred date, time, and party size and we'll check availability for you."
    },
    {
      keywords: ['menu', 'food', 'dish', 'eat', 'pizza', 'pasta', 'starter', 'dessert'],
      reply: "Our menu celebrates classic Italian cuisine with a modern touch. Highlights include:\n• Tagliatelle al Ragù Bolognese\n• Risotto ai Funghi Porcini\n• Margherita Napoletana pizza\n• Tiramisu della Casa\nFull menu available on request — shall I tell you about any dietary options?"
    },
    {
      keywords: ['vegan', 'vegetarian', 'gluten', 'allerg', 'diet', 'dairy'],
      reply: "We cater for many dietary requirements, including vegetarian, vegan, and gluten-free options. Please let our team know when booking or on arrival and we'll be happy to help."
    },
    {
      keywords: ['address', 'location', 'where', 'find', 'direct', 'soho', 'london'],
      reply: "You'll find us at:\n📍 14 Soho Square, London W1D 3QG\n\nNearest tube: Tottenham Court Road (Central & Northern lines), a 3-minute walk away."
    },
    {
      keywords: ['park', 'car', 'drive'],
      reply: "There's no dedicated parking at the restaurant, but the Q-Park on Newport Place (Chinatown) is approximately a 5-minute walk away."
    },
    {
      keywords: ['price', 'cost', 'how much', 'expensive', 'cheap'],
      reply: "Our mains range from £14 to £28. We also offer a set lunch menu at £22 for two courses or £27 for three courses, available Tuesday–Friday."
    },
    {
      keywords: ['private', 'event', 'party', 'group', 'celebrat', 'birthday', 'anniversary'],
      reply: "We have a private dining room that seats up to 24 guests — perfect for celebrations and corporate events. Please contact us at events@bellaroma.co.uk and we'll arrange everything for you."
    },
    {
      keywords: ['phone', 'call', 'contact', 'email', 'reach'],
      reply: "You can reach us at:\n📞 +44 20 7946 0321\n✉️ hello@bellaroma.co.uk\n\nOr just keep chatting here — we're happy to help!"
    },
    {
      keywords: ['thank', 'thanks', 'grazie', 'great', 'perfect', 'helpful'],
      reply: "Prego! 😊 It's our pleasure. We look forward to welcoming you to Bella Roma soon. Is there anything else I can help you with?"
    },
    {
      keywords: ['hello', 'hi', 'hey', 'ciao', 'buon', 'good morning', 'good afternoon', 'good evening'],
      reply: "Ciao! 👋 Great to hear from you. How can I help you today? I can assist with reservations, menu information, opening hours, and more."
    },
  ];

  function getTimestamp() {
    return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(text, sender) {
    const isBot = sender === 'bot';
    const wrapper = document.createElement('div');
    wrapper.className = `message ${sender}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = isBot ? 'BR' : 'You';

    const group = document.createElement('div');
    group.className = 'message-group';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = `Today, ${getTimestamp()}`;

    group.appendChild(bubble);
    group.appendChild(ts);
    wrapper.appendChild(avatar);
    wrapper.appendChild(group);

    // Insert before the typing indicator
    chatWindow.insertBefore(wrapper, typingEl);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function getBotReply(input) {
    const lower = input.toLowerCase();
    for (const rule of responses) {
      if (rule.keywords.some(kw => lower.includes(kw))) {
        return rule.reply;
      }
    }
    return "Thank you for your message! For anything I can't answer right away, please call us on +44 20 7946 0321 or email hello@bellaroma.co.uk and our team will be delighted to help.";
  }

  function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    // Show typing indicator
    typingEl.classList.add('visible');
    scrollToBottom();

    setTimeout(() => {
      typingEl.classList.remove('visible');
      appendMessage(getBotReply(text), 'bot');
      sendBtn.disabled = false;
    }, 900 + Math.random() * 600);
  }

  sendBtn.addEventListener('click', sendMessage);

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Quick reply buttons
  document.getElementById('quickReplies').addEventListener('click', (e) => {
    const btn = e.target.closest('.quick-reply-btn');
    if (!btn) return;
    userInput.value = btn.dataset.text;
    sendMessage();
  });

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
</script>

</body>
</html>
